    <ellipse cx="432" cy="30" rx="58" ry="28" fill="#7EC0E8"/>
    <ellipse cx="358" cy="40" rx="45" ry="22" fill="#7EC0E8"/>
  </g>
  <!-- 左側熱氣球（暗色） -->
