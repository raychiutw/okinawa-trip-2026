    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#305868"/>
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#306848" clip-path="inset(0 50% 0 0)"/>
    <rect x="-14" y="50" width="28" height="15" rx="5" fill="#504020"/>
