  <circle cx="200" cy="55" r="2.5" fill="#fff" opacity="0.20"/>
  <circle cx="320" cy="160" r="2" fill="#fff" opacity="0.18"/>
  <circle cx="440" cy="200" r="2.2" fill="#fff" opacity="0.15"/>
  <circle cx="150" cy="250" r="1.8" fill="#fff" opacity="0.12"/>
