<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- 右上角大太陽：圓 + 8 條光芒線 -->
  <g transform="translate(430,50)">
    <circle r="60" fill="#F47B5E" opacity="0.45"/>
    <g stroke="#F47B5E" stroke-width="5" stroke-linecap="round" opacity="0.40">
      <line x1="-78" y1="0" x2="-65" y2="0"/>
      <line x1="65" y1="0" x2="78" y2="0"/>
      <line x1="0" y1="-78" x2="0" y2="-65"/>
      <line x1="0" y1="65" x2="0" y2="78"/>
      <line x1="-55" y1="-55" x2="-46" y2="-46"/>
      <line x1="46" y1="-46" x2="55" y2="-55"/>
      <line x1="-55" y1="55" x2="-46" y2="46"/>
      <line x1="46" y1="46" x2="55" y2="55"/>
    </g>
  </g>
  <!-- 左側大椰子樹 -->
  <g transform="translate(20,200)" opacity="0.45">
    <rect x="14" y="60" width="12" height="140" rx="6" fill="#806020"/>
    <ellipse cx="20" cy="60" rx="60" ry="18" fill="#2D7A2D" transform="rotate(-30 20 60)"/>
    <ellipse cx="20" cy="60" rx="55" ry="16" fill="#348A34" transform="rotate(25 20 60)"/>
    <ellipse cx="20" cy="60" rx="52" ry="16" fill="#2D7A2D" transform="rotate(-65 20 60)"/>
    <ellipse cx="20" cy="60" rx="46" ry="14" fill="#348A34" transform="rotate(55 20 60)"/>
    <ellipse cx="20" cy="60" rx="42" ry="13" fill="#2D7A2D" transform="rotate(-10 20 60)"/>
  </g>
  <!-- 右側小椰子樹 -->
  <g transform="translate(445,270) scale(0.65)" opacity="0.35">
    <rect x="14" y="60" width="10" height="120" rx="5" fill="#806020"/>
    <ellipse cx="19" cy="60" rx="52" ry="16" fill="#2D7A2D" transform="rotate(-35 19 60)"/>
    <ellipse cx="19" cy="60" rx="46" ry="14" fill="#348A34" transform="rotate(20 19 60)"/>
    <ellipse cx="19" cy="60" rx="42" ry="13" fill="#2D7A2D" transform="rotate(-60 19 60)"/>
  </g>
  <!-- 底部三層海浪 -->
  <g opacity="0.42">
    <path d="M0 390 Q50 358 100 390 Q150 422 200 390 Q250 358 300 390 Q350 422 400 390 Q450 358 500 390 L500 500 L0 500Z" fill="#2A8EB0"/>
    <path d="M0 418 Q50 395 100 418 Q150 441 200 418 Q250 395 300 418 Q350 441 400 418 Q450 395 500 418 L500 500 L0 500Z" fill="#40A8C8" opacity="0.6"/>
    <path d="M0 445 Q50 432 100 445 Q150 458 200 445 Q250 432 300 445 Q350 458 400 445 Q450 432 500 445 L500 500 L0 500Z" fill="#60C0D8" opacity="0.35"/>
  </g>
  <!-- 中間偏上飛機剪影 -->
  <g transform="translate(195,72) rotate(-12) scale(2.8)" opacity="0.35">
    <path d="M0 0 L-8 4 L-30 4 L-35 10 L-30 4 L-50 6 L-50 2 L-30 2 L-8 -4Z" fill="#F47B5E"/>
    <path d="M-15 2 L-20 12 L-18 12 L-12 2" fill="#F47B5E"/>
